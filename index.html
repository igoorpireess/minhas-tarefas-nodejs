<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <main class="container">
      <header>
        <div class="header-tag">v1.0</div>
        <h1>Minhas <span class="accent">Tarefas</span></h1>
        <p class="subtitle">Organize seu dia com clareza.</p>
      </header>

      <section class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="taskInput"
            placeholder="Nova tarefa..."
            maxlength="120"
            autocomplete="off"
          />
          <button id="addBtn" aria-label="Adicionar tarefa">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </section>

      <section class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendentes</button>
        <button class="filter-btn" data-filter="done">Concluídas</button>
      </section>

      <section class="stats">
        <div class="stat">
          <span id="totalCount">0</span>
          <label>total</label>
        </div>
        <div class="stat">
          <span id="pendingCount">0</span>
          <label>pendentes</label>
        </div>
        <div class="stat">
          <span id="doneCount">0</span>
          <label>concluídas</label>
        </div>
      </section>

      <ul id="taskList" class="task-list">
        <!-- Tarefas renderizadas via JS -->
      </ul>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">✦</div>
        <p>Nenhuma tarefa aqui.</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
